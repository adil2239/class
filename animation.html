<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <div class="container">
      
      <div class="box"></div>
    </div>
</body>
</html>



<style>

    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #2b3033;
}

.container {
  width: 10vw;
  height: 100vh;
  position: absolute;
}

h1 {
  padding: 50px;
  color: #fff;
  font-size: 48px;
}

.box {
  width: 100px;
  height: 100px;
  background-color: #4861ec;
  box-shadow: 0 0 0px 15px #353f6d;
  display: inline-block;
  position: relative;
  border-radius: 50%; 
  animation-name:animate ;
  animation-duration: 5s;
  animation-timing-function: linear;
  animation-iteration-count:infinite;
  animation-direction:alternate;

}

/* @keyframes animate {

    0%{

        top: 0;
        left: 0;
  
    }

    25%{

        top: 0;
        left: calc(100vw - 100px);
    }
    50%{

        top: calc(100vh - 100px);
        left: calc(100vw - 100px);

    }

    75%{
       top: calc(100vh - 100px);
       left: 0;

    }

    100%{
        top:0;
        left:0;
    }
     
} */



 
@keyframes animate {


  0% {
    transform: translate(0, 0);
  }


  25% {
    transform: translate(calc(50vw - 100px), 0);
  }

  
  50% {
    transform: translate(
      calc(100vw - 100px),
      calc(100vh - 100px)
    );
  }


  75% {
    transform: translate(0, calc(100vh - 100px));
  }


  100% {
    transform: translate(0, 0);
  }
}





</style>
